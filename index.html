<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loopi — Legal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EE;
    --ink: #2C3530;
    --ink-soft: #6B7670;
    --ink-faint: #9CA39E;
    --sage: #5C7560;
    --rule: rgba(44, 53, 48, 0.12);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', sans-serif;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  
  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  
  .brand {
    font-family: var(--serif);
    font-size: 64px;
    font-weight: 500;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 16px;
  }
  
  .tagline {
    font-family: var(--serif);
    font-size: 20px;
    font-style: italic;
    color: var(--ink-soft);
    margin-bottom: 48px;
  }
  
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .links a {
    display: block;
    padding: 18px 24px;
    background: rgba(92, 117, 96, 0.06);
    border: 1px solid var(--rule);
    border-radius: 12px;
    color: var(--ink);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
    transition: all 0.2s;
  }
  
  .links a:hover {
    background: rgba(92, 117, 96, 0.12);
    border-color: var(--sage);
    color: var(--sage);
  }
  
  .footer {
    margin-top: 48px;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">loopi</div>
  <div class="tagline">a journal for mindful running</div>
  
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </div>
  
  <div class="footer">jiddewiegertjes@gmail.com</div>
</div>

</body>
</html>
